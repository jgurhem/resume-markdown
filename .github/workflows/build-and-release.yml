name: Build and Deploy Resume to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build HTML
      run: python convert.py --html resume-en.md

    - name: Build PDF
      run: python convert.py resume-en.md

    - name: Inject download button
      run: |
        python - <<'EOF'
        button_html = '''<div style="position:fixed;top:1rem;right:1rem;z-index:9999">
          <a href="resume-en.pdf" download
             style="background:#1a3a5c;color:#fff;padding:0.5rem 1rem;border-radius:4px;text-decoration:none;font-family:sans-serif;font-size:0.9rem;box-shadow:0 2px 6px rgba(0,0,0,0.3)">
            &#x2B07; Download PDF
          </a>
        </div>'''
        with open('resume-en.html', 'r') as f:
            html = f.read()
        html = html.replace('<body>', '<body>' + button_html, 1)
        with open('resume-en.html', 'w') as f:
            f.write(html)
        EOF

    - name: Prepare site directory
      run: |
        mkdir _site
        cp resume-en.html _site/index.html
        cp resume-en.pdf _site/resume-en.pdf

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
